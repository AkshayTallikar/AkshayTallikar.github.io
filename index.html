<!DOCTYPE html>
<html lang="en">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">

// ─── SHATTER ────────────────────────────────────────────────────────────────

function makeShards(rect, effect, bgColor = '#000', textColor = '#fff', label = '') {
  const shards = [];
  const w = rect.width;
  const h = rect.height;

  if (effect === 'shatter') {
    const cols = 6, rows = 5;
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        shards.push({
          x: (i / cols) * w, y: (j / rows) * h,
          w: w / cols, h: h / rows,
          dx: (Math.random() - 0.5) * 400 + ((i / cols) - 0.5) * 600,
          dy: (Math.random() - 0.5) * 200 + 300 + Math.random() * 300,
          rot: (Math.random() - 0.5) * 720,
          delay: Math.random() * 60, bg: bgColor, color: textColor, label,
          clip: Math.random() > 0.5
            ? `polygon(0 0, 100% 0, ${Math.random()*100}% 100%)`
            : `polygon(0 ${Math.random()*100}%, 100% 0, 100% 100%)`,
        });
      }
    }
  } else if (effect === 'dissolve') {
    const cols = 12, rows = 8;
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        shards.push({
          x: (i / cols) * w, y: (j / rows) * h,
          w: w / cols + 0.5, h: h / rows + 0.5,
          dx: 0, dy: 0, rot: 0,
          delay: (i + j) * 8 + Math.random() * 80, scale: 0,
          bg: bgColor, color: textColor, label, clip: 'none',
        });
      }
    }
  } else if (effect === 'scatter') {
    const chunks = 6;
    for (let i = 0; i < chunks; i++) {
      shards.push({
        x: 0, y: (i / chunks) * h, w, h: h / chunks + 1,
        dx: (Math.random() - 0.5) * 1400, dy: (Math.random() - 0.5) * 1000,
        rot: (Math.random() - 0.5) * 180, delay: i * 30,
        bg: bgColor, color: textColor, label, clip: 'none',
      });
    }
  } else if (effect === 'glitch') {
    ['#ff003c', '#00e5ff', bgColor].forEach((c, idx) => {
      shards.push({
        x: 0, y: 0, w, h,
        dx: (idx - 1) * 40 + (Math.random() - 0.5) * 20,
        dy: (Math.random() - 0.5) * 16, rot: 0, delay: idx * 40,
        bg: idx < 2 ? 'transparent' : c, color: idx < 2 ? c : textColor,
        label, clip: 'none', mix: idx < 2 ? 'screen' : 'normal', isGlitch: true,
      });
    });
  } else {
    shards.push({ x: 0, y: 0, w, h, dx: 0, dy: 0, rot: 0, delay: 0, bg: bgColor, color: textColor, label, clip: 'none' });
  }
  return shards;
}

function ShatterLayer({ items, onDone }) {
  const [phase, setPhase] = React.useState('enter');
  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase('exit'), 20);
    const t2 = setTimeout(() => onDone && onDone(), 1400);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 50 }}>
      {items.map((it, idx) => {
        const shards = makeShards(it.rect, it.effect, it.bg, it.color, it.label);
        return (
          <div key={it.id || idx} style={{ position: 'absolute', left: it.rect.left, top: it.rect.top, width: it.rect.width, height: it.rect.height }}>
            {shards.map((s, i) => (
              <div key={i} style={{
                position: 'absolute', left: s.x, top: s.y, width: s.w, height: s.h,
                background: s.bg, color: s.color, clipPath: s.clip,
                transition: `transform 1.1s cubic-bezier(.22,.61,.36,1) ${s.delay}ms, opacity 1.1s ease-out ${s.delay}ms`,
                transform: phase === 'enter' ? 'translate(0,0) rotate(0) scale(1)' : `translate(${s.dx}px,${s.dy}px) rotate(${s.rot}deg) scale(${s.scale != null ? s.scale : 1})`,
                opacity: phase === 'enter' ? 1 : 0,
                mixBlendMode: s.mix || 'normal', overflow: 'hidden', willChange: 'transform,opacity',
              }}>
                {s.label && i === 0 && !s.isGlitch ? (
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'JetBrains Mono',monospace", fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: s.color }}>{s.label}</div>
                ) : null}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ─── JOURNEY MAP ─────────────────────────────────────────────────────────────

// Mercator-ish projection for continental US
// Bounds: lat 24.5–49°N, lon 67–124.7°W → SVG 800×480
const W = 800, H = 480;
const proj = (lat, lon) => [
  (lon + 124.7) / 57.7 * W,
  (49 - lat) / 24 * H,
];

// City coordinates
const CITIES = {
  pb:  { lat: 42.20, lon: -88.15, name: 'Port Barrington, IL' },
  osu: { lat: 39.96, lon: -82.99, name: 'Columbus, OH' },
  sd:  { lat: 32.72, lon: -117.16, name: 'San Diego, CA' },
  cin: { lat: 39.10, lon: -84.51, name: 'Cincinnati, OH' },
};
Object.values(CITIES).forEach(c => { [c.x, c.y] = proj(c.lat, c.lon); });

// Quadratic bezier arc between two points, arcing upward
const arcPath = (a, b) => {
  const cx = (a.x + b.x) / 2;
  const cy = Math.min(a.y, b.y) - 90;
  return `M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}`;
};

function GlobeZoom({ onComplete, onCancel }) {
  const [phase, setPhase] = React.useState(0);
  const [mapIn, setMapIn] = React.useState(false);

  React.useEffect(() => {
    const t0 = setTimeout(() => setMapIn(true), 80);
    const timers = [t0,
      setTimeout(() => setPhase(1), 1100),   // → Columbus / OSU
      setTimeout(() => setPhase(2), 3100),   // → San Diego / Qualcomm
      setTimeout(() => setPhase(3), 5100),   // → Cincinnati / J&J
      setTimeout(() => setPhase(4), 6900),   // → Port Barrington / John Deere
      setTimeout(() => onComplete && onComplete(), 8400),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  const STAGES = [
    { label: 'HOME BASE',           sub: 'Port Barrington, IL  ·  42.20°N 88.15°W' },
    { label: 'OHIO STATE UNIVERSITY', sub: 'Columbus, OH  ·  B.S. Mathematics  ·  Dec 2025' },
    { label: 'QUALCOMM',            sub: 'San Diego, CA  ·  Software Engineer Intern  ·  Summer 2023' },
    { label: 'JOHNSON & JOHNSON',   sub: 'Cincinnati, OH  ·  Data Science Co-Op  ·  Fall 2024' },
    { label: 'JOHN DEERE',          sub: 'Remote / IL  ·  Data Analytics  ·  Feb 2024 – Dec 2025' },
  ];
  const info = STAGES[phase];

  // Travel legs: [from, to, phase it draws on, draw duration ms]
  const LEGS = [
    { a: CITIES.pb,  b: CITIES.osu, phase: 1, dur: 1800 },
    { a: CITIES.osu, b: CITIES.sd,  phase: 2, dur: 1800 },
    { a: CITIES.sd,  b: CITIES.cin, phase: 3, dur: 1800 },
    { a: CITIES.cin, b: CITIES.pb,  phase: 4, dur: 1400 },
  ];

  return (
    <div onClick={() => onCancel && onCancel()} style={{ position:'fixed', inset:0, zIndex:90, background:'linear-gradient(160deg,#010b16 0%,#021424 100%)', cursor:'pointer', display:'flex', flexDirection:'column', animation:'gz-fadein 0.4s ease-out both', overflow:'hidden' }}>

      {/* Header */}
      <div style={{ padding:'22px 32px 0', fontFamily:"'JetBrains Mono',monospace", color:'#fff' }}>
        <div style={{ fontSize:10, letterSpacing:'0.18em', opacity:0.4, textTransform:'uppercase' }}>CAREER JOURNEY · ABOUT</div>
        <div style={{ fontSize:17, letterSpacing:'0.12em', marginTop:6, transition:'all 0.5s ease' }}>{info.label}</div>
        <div style={{ fontSize:11, opacity:0.55, marginTop:4, transition:'all 0.5s ease' }}>{info.sub}</div>
      </div>

      {/* Map */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 16px' }}>
        <svg
          viewBox={`0 0 ${W} ${H}`}
          style={{ width:'min(820px,96vw)', height:'auto', display:'block', transform: mapIn ? 'scale(1)' : 'scale(0.96)', opacity: mapIn ? 1 : 0, transition:'transform 0.6s cubic-bezier(.22,.61,.36,1),opacity 0.5s' }}
        >
          {/* Continental US outline — Mercator approximation using proj() coords */}
          <path
            d="M800,30 L764,116 L757,142 L732,170 L703,174 L688,206 L674,242 L681,280 L639,310 L607,342 L599,372 L619,476 L596,464 L580,402 L553,392 L510,376 L483,402 L418,398 L379,472 L275,394 L251,356 L189,362 L105,338 L58,306 L41,250 L24,210 L3,172 L6,146 L2,140 L7,54 L0,6 L22,6 L103,0 L200,0 L283,0 L378,0 L405,0 L485,20 L497,34 L543,62 L568,132 L610,142 L617,122 L675,102 L703,80 L764,30 Z"
            fill="rgba(12,45,90,0.5)"
            stroke="rgba(50,120,200,0.55)"
            strokeWidth="1.5"
            strokeLinejoin="round"
          />

          {/* Subtle latitude/longitude grid */}
          {[35,40,45].map(lat => {
            const [,y] = proj(lat, -90);
            return <line key={lat} x1={0} y1={y} x2={W} y2={y} stroke="rgba(80,140,220,0.1)" strokeWidth="0.5" />;
          })}
          {[-120,-110,-100,-90,-80].map(lon => {
            const [x] = proj(40, lon);
            return <line key={lon} x1={x} y1={0} x2={x} y2={H} stroke="rgba(80,140,220,0.1)" strokeWidth="0.5" />;
          })}

          {/* Travel arcs — always rendered, dash-animated */}
          {LEGS.map((leg, i) => (
            <path
              key={i}
              d={arcPath(leg.a, leg.b)}
              fill="none"
              stroke="#5bcfff"
              strokeWidth="2.5"
              strokeLinecap="round"
              strokeDasharray="1"
              pathLength="1"
              style={{
                strokeDashoffset: phase >= leg.phase ? 0 : 1,
                transition: `stroke-dashoffset ${leg.dur}ms linear`,
                filter: 'drop-shadow(0 0 4px rgba(91,207,255,0.6))',
              }}
            />
          ))}

          {/* Arrowhead at each destination */}
          {LEGS.map((leg, i) => phase >= leg.phase && (
            <circle key={'tip'+i} cx={leg.b.x} cy={leg.b.y} r="3.5" fill="#5bcfff"
              style={{ filter:'drop-shadow(0 0 6px #5bcfff)' }} />
          ))}

          {/* City pins */}
          <JourneyPin city={CITIES.pb}  label="Port Barrington, IL" labelSide="above" active={phase===0||phase===4} visible={true} />
          {phase>=1 && <JourneyPin city={CITIES.osu} label="Columbus, OH"        labelSide="right" active={phase===1} visible={true} />}
          {phase>=2 && <JourneyPin city={CITIES.sd}  label="San Diego, CA"       labelSide="right" active={phase===2} visible={true} />}
          {phase>=3 && <JourneyPin city={CITIES.cin} label="Cincinnati, OH"      labelSide="below" active={phase===3} visible={true} />}

          {/* Company badges */}
          {phase>=1 && <OsuBadge   x={CITIES.osu.x} y={CITIES.osu.y} />}
          {phase>=2 && <QualcommBadge x={CITIES.sd.x}  y={CITIES.sd.y}  />}
          {phase>=3 && <JJBadge    x={CITIES.cin.x} y={CITIES.cin.y} />}
          {phase>=4 && <JohnDeereBadge x={CITIES.pb.x}  y={CITIES.pb.y}  />}
        </svg>
      </div>

      {/* Progress + footer */}
      <div style={{ padding:'0 32px 20px', display:'flex', alignItems:'center', gap:8 }}>
        {[0,1,2,3,4].map(p => (
          <div key={p} style={{ height:4, width: p===phase ? 28 : 8, borderRadius:2, background: p<=phase ? '#5bcfff' : 'rgba(255,255,255,0.15)', transition:'all 0.4s' }} />
        ))}
        <div style={{ marginLeft:'auto', fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'rgba(255,255,255,0.3)', letterSpacing:'0.14em', textTransform:'uppercase' }}>[ tap to skip ]</div>
      </div>

      <style>{`
        @keyframes gz-fadein { from{opacity:0} to{opacity:1} }
        @keyframes gz-pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
        @keyframes gz-ring { 0%{r:6;opacity:0.7} 100%{r:22;opacity:0} }
      `}</style>
    </div>
  );
}

function JourneyPin({ city, label, labelSide, active }) {
  const tx = labelSide==='right' ? city.x+10 : labelSide==='left' ? city.x-10 : city.x;
  const ty = labelSide==='above' ? city.y-14 : labelSide==='below' ? city.y+22 : city.y+4;
  const anchor = labelSide==='right' ? 'start' : labelSide==='left' ? 'end' : 'middle';
  return (
    <g>
      {active && (
        <circle cx={city.x} cy={city.y} r="6" fill="none" stroke="#5bcfff" strokeWidth="1"
          style={{ animation:'gz-fadein 0.3s ease-out both', transformOrigin:`${city.x}px ${city.y}px`,
                   opacity:0.5, animationName:'gz-pulse', animationDuration:'2s', animationIterationCount:'infinite' }} />
      )}
      <circle cx={city.x} cy={city.y} r={active ? 6 : 5} fill={active ? '#5bcfff' : 'rgba(91,207,255,0.65)'}
        style={{ filter: active ? 'drop-shadow(0 0 8px #5bcfff)' : 'none', transition:'all 0.4s' }} />
      <circle cx={city.x} cy={city.y} r="2.5" fill="#fff" />
      <text x={tx} y={ty} textAnchor={anchor} fill="rgba(255,255,255,0.82)"
        fontSize="11" fontFamily="'JetBrains Mono',monospace" letterSpacing="0.3">
        {label}
      </text>
    </g>
  );
}

// Badge helper — renders a company badge near a city
function Badge({ x, y, ox, oy, lines, textColor, bgColor, borderColor }) {
  const bw = 88, bh = lines.length===1 ? 24 : 32;
  return (
    <g transform={`translate(${x+ox},${y+oy})`} style={{ animation:'gz-fadein 0.5s ease-out both' }}>
      <rect x={-bw/2} y={-bh/2} width={bw} height={bh} rx="3"
        fill={bgColor} stroke={borderColor||'rgba(255,255,255,0.2)'} strokeWidth="1" />
      {lines.map((ln, i) => (
        <text key={i} textAnchor="middle" y={lines.length===1 ? 5 : (i===0 ? -4 : 10)}
          fontSize="9" fontWeight="700" fill={textColor}
          fontFamily="'Inter',sans-serif" letterSpacing="0.8">{ln}</text>
      ))}
    </g>
  );
}

function OsuBadge({ x, y }) {
  // OSU is at (578,181) — put badge to the right, above the pin
  return <Badge x={x} y={y} ox={60} oy={-34} lines={['OHIO STATE','BUCKEYES']} textColor="#fff" bgColor="#BB0000" />;
}
function QualcommBadge({ x, y }) {
  // SD is at (105,326) — put badge to the right
  return <Badge x={x} y={y} ox={58} oy={-28} lines={['QUALCOMM']} textColor="#fff" bgColor="#3253DC" />;
}
function JJBadge({ x, y }) {
  // Cincinnati is at (557,198) — badge below right
  return <Badge x={x} y={y} ox={60} oy={34} lines={['JOHNSON','& JOHNSON']} textColor="#CC0000" bgColor="#fff" borderColor="#CC0000" />;
}
function JohnDeereBadge({ x, y }) {
  // PB is at (507,136) — badge to the left, below
  return <Badge x={x} y={y} ox={-62} oy={38} lines={['JOHN DEERE']} textColor="#FFDE00" bgColor="#367C2B" />;
}

// ─── MODALS ─────────────────────────────────────────────────────────────────

// ─── STAGE SCENE ─────────────────────────────────────────────────────────────

function StageDecor({ dims }) {
  const W = dims.w, H = dims.h;

  // Replicate curtain layout math
  const cols = 4, gap = 14, margin = 28, curtainW = 110;
  const bw      = Math.round((Math.min(W - 2*margin, 1040) - (cols-1)*gap) / cols);
  const rowW    = cols*bw + (cols-1)*gap;
  const boxLeft = (W - rowW) / 2;
  const tMargin = Math.max(4, Math.round((boxLeft - curtainW) / 2));
  const stageL  = tMargin + curtainW;
  const stageR  = W - tMargin - curtainW;

  const floorY = H * 0.58;

  // At a given y, interpolate the left/right edges of the floor trapezoid.
  // At floorY (t=0): stageL..stageR. At H (t=1): 0..W.
  const xAtY = (y) => {
    const t = (y - floorY) / (H - floorY);
    return [stageL * (1 - t), stageR + (W - stageR) * t];
  };

  // Distribute N plank seams with perspective foreshortening
  const N = 22;
  const ys = Array.from({length: N + 1}, (_, i) =>
    floorY + (H - floorY) * Math.pow(i / N, 0.5)
  );

  // Alternating warm mahogany/walnut plank fills
  const plankFills = ['#7a4520', '#62380f', '#6e4018', '#58320d', '#724218'];

  // Grain lines: converge from bottom spread toward vanishing point at (W/2, floorY)
  const GRAINS = 10;
  const [bL, bR] = xAtY(H);
  const grainXs = Array.from({length: GRAINS + 1}, (_, i) => bL + (i / GRAINS) * (bR - bL));

  return (
    <svg width={W} height={H}
      style={{ position:'fixed', top:0, left:0, pointerEvents:'none', zIndex:-1 }}>
      <defs>
        <linearGradient id="sg-depth" x1="0" y1={floorY} x2="0" y2={H} gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stopColor="rgba(0,0,0,0.55)"/>
          <stop offset="30%"  stopColor="rgba(0,0,0,0.08)"/>
          <stop offset="100%" stopColor="rgba(0,0,0,0.38)"/>
        </linearGradient>
        <radialGradient id="sg-pool" gradientUnits="userSpaceOnUse"
          cx={W*0.5} cy={floorY + (H-floorY)*0.18} r={(stageR-stageL)*0.6}>
          <stop offset="0%"   stopColor="rgba(255,248,190,0.18)"/>
          <stop offset="100%" stopColor="rgba(255,240,160,0)"/>
        </radialGradient>
        <linearGradient id="sg-teaser" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#000" stopOpacity="0.92"/>
          <stop offset="100%" stopColor="#000" stopOpacity="0"/>
        </linearGradient>
        {/* Clip the floor to the stage opening between the curtains */}
        <clipPath id="stage-opening">
          <rect x={stageL} y={floorY} width={stageR - stageL} height={H - floorY}/>
        </clipPath>
      </defs>

      {/* ── FLOOR (clipped to stage opening between curtains) ── */}
      <g clipPath="url(#stage-opening)">
        {/* Planks */}
        {ys.slice(0, -1).map((y1, i) => {
          const y2 = ys[i + 1];
          const [x1L, x1R] = xAtY(y1);
          const [x2L, x2R] = xAtY(y2);
          return (
            <polygon key={i}
              points={`${x1L},${y1} ${x1R},${y1} ${x2R},${y2} ${x2L},${y2}`}
              fill={plankFills[i % plankFills.length]}
            />
          );
        })}

        {/* Grain lines converging to vanishing point */}
        {grainXs.map((bx, i) => {
          const [tL] = xAtY(floorY);
          const tx = tL + (i / GRAINS) * (stageR - stageL);
          return (
            <line key={i} x1={bx} y1={H} x2={tx} y2={floorY}
              stroke="#2a1206" strokeWidth={0.6} opacity={0.28}/>
          );
        })}

        {/* Plank seam lines */}
        {ys.map((y, i) => {
          const [xL, xR] = xAtY(y);
          return (
            <line key={i} x1={xL} y1={y} x2={xR} y2={y}
              stroke="#1a0b03" strokeWidth={i === 0 ? 2 : 1} opacity={i === 0 ? 0.9 : 0.65}/>
          );
        })}

        {/* Depth/lighting overlay */}
        <rect x={stageL} y={floorY} width={stageR - stageL} height={H - floorY} fill="url(#sg-depth)"/>

        {/* Warm spotlight pool reflection */}
        <ellipse cx={W*0.5} cy={floorY + (H-floorY)*0.18}
          rx={(stageR-stageL)*0.36} ry={(H-floorY)*0.18}
          fill="url(#sg-pool)"/>

        {/* Front apron shadow */}
        <rect x={stageL} y={H - 44} width={stageR - stageL} height={44} fill="rgba(0,0,0,0.55)"/>
      </g>

      {/* ── TOP TEASER ─────────────────────────────────── */}
      <rect x={stageL} y={0} width={stageR - stageL} height={74} fill="url(#sg-teaser)"/>
      <line x1={stageL} y1={68} x2={stageR} y2={68}
        stroke="#C9A84C" strokeWidth={0.9} opacity={0.48}/>

      {/* Proscenium corner brackets */}
      <g stroke="#C9A84C" strokeWidth={1} fill="none" opacity={0.42}>
        <line x1={stageL} y1={0}  x2={stageL} y2={84}/>
        <line x1={stageL} y1={68} x2={stageL+36} y2={68}/>
      </g>
      <g stroke="#C9A84C" strokeWidth={1} fill="none" opacity={0.42}>
        <line x1={stageR} y1={0}  x2={stageR} y2={84}/>
        <line x1={stageR} y1={68} x2={stageR-36} y2={68}/>
      </g>
    </svg>
  );
}

// ─── EXPERIENCE DEMO ANIMATIONS ──────────────────────────────────────────────

function JohnDeereDemo() {
  const [ready, setReady]   = React.useState(false);
  const [spend, setSpend]   = React.useState(0);
  const [tables, setTables] = React.useState(0);

  React.useEffect(() => {

function SkillAchievements() {
  const achievements = React.useMemo(() => (
    SKILL_GROUPS.flatMap((group, gi) => group.items.map((skill, si) => ({
      skill,
      group: group.label,
      rarity: ['Common', 'Rare', 'Epic', 'Legendary'][(gi + si) % 4],
      xp: 80 + gi * 45 + si * 15,
    })))
  ), []);
  const [unlocked, setUnlocked] = React.useState(0);

  React.useEffect(() => {
    setUnlocked(0);
    const timers = achievements.map((_, i) => (
      setTimeout(() => setUnlocked(count => Math.max(count, i + 1)), 180 + i * 115)
    ));
    return () => timers.forEach(clearTimeout);
  }, [achievements]);

  return (
    <div style={skillS.wrap}>
      <div style={skillS.hud}>
        <div>
          <div style={skillS.hudKicker}>Achievement Log</div>
          <div style={skillS.hudTitle}>{unlocked}/{achievements.length} unlocked</div>
        </div>
        <div style={skillS.progressTrack}>
          <div style={{ ...skillS.progressFill, width: `${(unlocked / achievements.length) * 100}%` }} />
        </div>
      </div>

      {SKILL_GROUPS.map((group, gi) => {
        const prior = SKILL_GROUPS.slice(0, gi).reduce((sum, g) => sum + g.items.length, 0);
        const visibleItems = group.items
          .map((skill, si) => ({ skill, si, index: prior + si }))
          .filter(item => item.index < unlocked);
        if (!visibleItems.length) return null;
        return (
          <div key={group.label} style={skillS.group}>
            <div style={skillS.groupLabel}>{group.label}</div>
            <div style={skillS.grid}>
              {visibleItems.map(({ skill, si, index }) => {
                const item = achievements[index];
                return (
                  <div
                    key={skill}
                    style={{
                      ...skillS.badge,
                      animation: 'achievement-pop 0.58s cubic-bezier(.2,1.35,.32,1) both',
                      animationDelay: `${si * 18}ms`,
                    }}
                  >
                    <div style={skillS.badgeIcon}>{String(index + 1).padStart(2, '0')}</div>
                    <div style={skillS.badgeCopy}>
                      <div style={skillS.unlocked}>Achievement Unlocked</div>
                      <div style={skillS.skillName}>{skill}</div>
                      <div style={skillS.meta}>{item.rarity} · XP +{item.xp}</div>
                    </div>
                    <div style={skillS.shine} />
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ContactCallEmail() {
  const [phase, setPhase] = React.useState('ringing');
  const [form, setForm] = React.useState({ name: '', subject: '', message: '' });
  const timersRef = React.useRef([]);
  const completedRef = React.useRef(false);

  const clearCallTimers = () => {
    timersRef.current.forEach(clearTimeout);
    timersRef.current = [];
  };

  const completeCall = () => {
    if (completedRef.current) return;
    completedRef.current = true;
    clearCallTimers();
    setPhase('email');
  };

  React.useEffect(() => {
    timersRef.current = [
      setTimeout(() => {
        if (!completedRef.current) setPhase('answered');
      }, 1800),
      setTimeout(completeCall, 2650),
    ];
    return clearCallTimers;
  }, []);

  const mailSubject = form.subject.trim() || 'Portfolio inquiry';
  const body = [
    `Name: ${form.name.trim() || 'Not provided'}`,
    '',
    form.message.trim(),
  ].join('\n');
  const mailto = `mailto:tallikarakshay@gmail.com?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(body)}`;
  const canSend = form.name.trim() && form.subject.trim() && form.message.trim();

  return (
    <div style={contactS.wrap}>
      {phase !== 'email' ? (
        <div style={contactS.callStage}>
          <div style={contactS.phone}>
            <div style={contactS.speaker} />
            <div style={contactS.callScreen}>
              <div style={contactS.callLabel}>{phase === 'ringing' ? 'Incoming call' : 'Connected'}</div>
              <div style={contactS.caller}>Akshay Tallikar</div>
              <div style={contactS.callSub}>{phase === 'ringing' ? 'Portfolio line' : 'Opening email channel'}</div>
              <div style={contactS.avatarRing}>
                <div style={contactS.avatarInitials}>AT</div>
              </div>
            </div>
            <div style={contactS.callControls}>
              <button
                type="button"
                onClick={completeCall}
                style={{...contactS.callBtn, ...contactS.acceptBtn}}
              >
                Pick up
              </button>
            </div>
          </div>
        </div>
      ) : (
        <div style={contactS.emailPanel}>
          <div style={contactS.emailTop}>
            <div>
              <div style={contactS.emailKicker}>Call picked up</div>
              <div style={contactS.emailTitle}>Send Akshay an email</div>
            </div>
            <div style={contactS.emailTo}>TO · tallikarakshay@gmail.com</div>
          </div>

          <form
            style={contactS.form}
            onSubmit={(e) => {
              e.preventDefault();
              if (!canSend) return;
              window.location.href = mailto;
            }}
          >
            <label style={contactS.label}>
              Your name
              <input
                required
                value={form.name}
                onChange={(e) => setForm(v => ({ ...v, name: e.target.value }))}
                placeholder="Jane Doe"
                style={contactS.input}
              />
            </label>
            <label style={contactS.label}>
              Subject
              <input
                required
                value={form.subject}
                onChange={(e) => setForm(v => ({ ...v, subject: e.target.value }))}
                placeholder="Project opportunity"
                style={contactS.input}
              />
            </label>
            <label style={contactS.label}>
              Message
              <textarea
                required
                value={form.message}
                onChange={(e) => setForm(v => ({ ...v, message: e.target.value }))}
                placeholder="Tell me what you are building..."
                style={contactS.textarea}
              />
            </label>
            <button
              type="submit"
              disabled={!canSend}
              style={{
                ...contactS.send,
                opacity: canSend ? 1 : 0.48,
                cursor: canSend ? 'pointer' : 'not-allowed',
              }}
            >
              Open email app
            </button>
          </form>
        </div>
      )}
    </div>
  );
}

function BehindTheScenesArchive() {
  const [active, setActive] = React.useState(0);
  React.useEffect(() => {
    const timers = BTS_ITEMS.map((_, i) => setTimeout(() => setActive(i), 900 + i * 1650));
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={btsS.wrap}>
      <p style={mS.lead}>A quick flip through how the work gets made.</p>

      <div style={btsS.desk}>
        <div style={btsS.stack}>
          {BTS_ITEMS.map((item, i) => {
            const isActive = i === active;
            const isPast = i < active;
            return (
              <div
                key={item.title}
                style={{
                  ...btsS.paper,
                  zIndex: isActive ? 20 : BTS_ITEMS.length - i,
                  transform: isActive
                    ? 'translate(-50%, -50%) rotate(0deg) scale(1)'
                    : isPast
                      ? `translate(calc(-50% - ${120 + i * 8}px), calc(-50% + ${28 + i * 6}px)) rotate(${-10 - i * 3}deg) scale(0.9)`
                      : `translate(calc(-50% + ${22 + i * 10}px), calc(-50% + ${18 + i * 5}px)) rotate(${4 + i * 3}deg) scale(${0.94 - i * 0.02})`,
                  opacity: isPast ? 0.42 : 1,
                  animation: isActive ? 'bts-flip 1.3s cubic-bezier(.22,.61,.36,1) both' : 'none',
                }}
              >
                <div style={btsS.paperTag}>{item.tag}</div>
                <div style={btsS.paperTitle}>{item.title}</div>
                <div style={btsS.paperRule} />
                <div style={btsS.paperNote}>{item.note}</div>
                <div style={btsS.paperMarks}>
                  <span style={{...btsS.paperMark, width:'86%'}} />
                  <span style={{...btsS.paperMark, width:'72%'}} />
                  <span style={{...btsS.paperMark, width:'54%'}} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={btsS.timeline}>
        {BTS_ITEMS.map((item, i) => (
          <button
            key={item.title}
            type="button"
            onClick={() => setActive(i)}
            style={{
              ...btsS.timelineItem,
              ...(i === active ? btsS.timelineActive : {}),
            }}
          >
            {item.title}
          </button>
        ))}
      </div>
    </div>
  );
}

function Modal({ sectionKey, onClose, variant = 'drawer', darkMode = false }) {
  const section = SECTION_CONTENT[sectionKey];
  const [entering, setEntering] = React.useState(true);
  const [closing, setClosing] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setEntering(false), 20);
    const onKey = (e) => { if (e.key === 'Escape') triggerClose(); };
    window.addEventListener('keydown', onKey);
    return () => { clearTimeout(t); window.removeEventListener('keydown', onKey); };
  }, []);
  const triggerClose = () => { setClosing(true); setTimeout(() => onClose(), 650); };
  if (!section) return null;
  const Body = section.body;
  const visible = !entering && !closing;
  const isCenter = variant === 'center';

  const panelBg    = darkMode ? '#141414' : '#fdfdfa';
  const panelBdr   = darkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
  const panelShadow= darkMode ? '0 40px 120px rgba(0,0,0,0.7)' : '0 40px 120px rgba(0,0,0,0.22)';
  const overlayBg  = darkMode
    ? (visible ? 'rgba(0,0,0,0.88)' : 'rgba(0,0,0,0)')
    : (visible ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0)');
  const fg         = darkMode ? '#f0f0f0' : '#000';
  const closeBdrC  = darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
  const hdrGrad    = darkMode
    ? `linear-gradient(to bottom,${panelBg} 80%,rgba(20,20,20,0))`
    : `linear-gradient(to bottom,${panelBg} 80%,rgba(253,253,250,0))`;

  const panelStyle = isCenter ? {
    width:'min(720px,92vw)', maxHeight:'86vh', background: panelBg, color: fg,
    border:`1px solid ${panelBdr}`, boxShadow: panelShadow,
    transform: visible ? 'translateY(0) scale(1)' : 'translateY(30px) scale(0.96)',
    opacity: visible ? 1 : 0,
    transition:'transform 0.7s cubic-bezier(.22,.61,.36,1),opacity 0.5s',
    overflowY:'auto', display:'flex', flexDirection:'column', alignSelf:'center',
  } : {
    width:'min(640px,92vw)', height:'100%', background: panelBg, color: fg,
    borderLeft:`1px solid ${panelBdr}`, boxShadow:'-40px 0 80px rgba(0,0,0,0.08)',
    transform: visible ? 'translateX(0)' : 'translateX(100%)',
    transition:'transform 0.7s cubic-bezier(.22,.61,.36,1)',
    overflowY:'auto', display:'flex', flexDirection:'column',
  };

  return (
    <div onClick={triggerClose} style={{ position:'fixed', inset:0, zIndex:100, background: overlayBg, backdropFilter: visible ? 'blur(20px)' : 'blur(0px)', WebkitBackdropFilter: visible ? 'blur(20px)' : 'blur(0px)', transition:'background 0.6s,backdrop-filter 0.6s', display:'flex', alignItems: isCenter ? 'center' : 'stretch', justifyContent: isCenter ? 'center' : 'flex-end', padding: isCenter ? '40px' : 0 }}>
      <div onClick={(e)=>e.stopPropagation()} style={panelStyle}>
        <div style={{ position:'sticky', top:0, zIndex:2, padding:'28px 48px 20px', background: hdrGrad, display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.18em', opacity:0.4, color: fg }}>§ {section.index}</div>
            <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:400, fontStyle:'italic', marginTop:2, lineHeight:1, color: fg }}>{section.title}</h2>
          </div>
          <button onClick={triggerClose}
            style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase', background:'transparent', border:`1px solid ${closeBdrC}`, padding:'10px 16px', cursor:'pointer', color: fg, transition:'background 0.3s,color 0.3s' }}
            onMouseEnter={(e)=>{ e.currentTarget.style.background=fg; e.currentTarget.style.color=panelBg; }}
            onMouseLeave={(e)=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color=fg; }}>
            Close ×
          </button>
        </div>
        <div style={{ padding:'16px 48px 64px', flex:1, color: fg }}><Body /></div>
      </div>
    </div>
  );
}

function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function placeBoxes(count, vw, vh, avoidRect, seed) {
  const rng = mulberry32(seed);
  const cx = vw/2, cy = vh/2;
  const scale = Math.min(1, Math.max(0.75, Math.min(vw,vh)/900));
  const baseW = Math.round(200*scale), baseH = Math.round(120*scale);
  const avoidHalfW = avoidRect ? avoidRect.w/2 : 300;
  const avoidHalfH = avoidRect ? avoidRect.h/2 : 110;
  const maxRx = vw/2 - baseW/2 - 24, maxRy = vh/2 - baseH/2 - 24;
  const minRx = avoidHalfW + baseW/2 + 30, minRy = avoidHalfH + baseH/2 + 30;
  const rx = Math.max(minRx, Math.min(maxRx, (minRx+maxRx)/2));
  const ry = Math.max(minRy, Math.min(maxRy, (minRy+maxRy)/2));
  const startAngle = -Math.PI/2;
  return Array.from({length:count}, (_,i) => {
    const angle = startAngle + (i/count)*Math.PI*2;
    const sizeJit = 0.9 + ((i%3)*0.08) + (rng()-0.5)*0.08;
    const w = Math.round(baseW*sizeJit), h = Math.round(baseH*sizeJit);
    return { x: cx+Math.cos(angle)*rx - w/2, y: cy+Math.sin(angle)*ry - h/2, w, h };
  });
}

// Full-screen canvas that draws the light cones via mix-blend-mode: screen
function SpotlightBeams({ beamL, beamR, angL, angR, vw, vh }) {
  const ref = React.useRef(null);

  React.useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    canvas.width = vw; canvas.height = vh;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, vw, vh);

    const drawBeam = (ox, oy, angle) => {
      const SPREAD = 0.14; // ~8° half-angle
      const LEN = Math.hypot(vw, vh) * 1.4;
      const ax = ox + Math.sin(angle) * LEN, ay = oy + Math.cos(angle) * LEN;
      const x1 = ox + Math.sin(angle - SPREAD)*LEN, y1 = oy + Math.cos(angle - SPREAD)*LEN;
      const x2 = ox + Math.sin(angle + SPREAD)*LEN, y2 = oy + Math.cos(angle + SPREAD)*LEN;

      // Beam body — gradient from bright source to transparent far end
      const grad = ctx.createLinearGradient(ox, oy, ax, ay);
      grad.addColorStop(0,    'rgba(255,250,215,0.72)');
      grad.addColorStop(0.04, 'rgba(255,246,205,0.38)');
      grad.addColorStop(0.22, 'rgba(255,243,195,0.15)');
      grad.addColorStop(0.60, 'rgba(255,240,185,0.05)');
      grad.addColorStop(1,    'rgba(255,236,175,0)');
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Lens flare glow at source
      const src = ctx.createRadialGradient(ox, oy, 0, ox, oy, 55);
      src.addColorStop(0,   'rgba(255,252,220,0.55)');
      src.addColorStop(0.4, 'rgba(255,248,200,0.18)');
      src.addColorStop(1,   'rgba(255,244,185,0)');
      ctx.fillStyle = src;
      ctx.beginPath(); ctx.arc(ox, oy, 55, 0, Math.PI*2); ctx.fill();

      // Hot spot where beam axis intersects the name (vh*0.48)
      const nameY = vh * 0.48;
      const cosA = Math.cos(angle);
      if (Math.abs(cosA) > 0.02) {
        const t = (nameY - oy) / cosA;
        if (t > 0 && t < LEN) {
          const hx = ox + Math.sin(angle) * t;
          const hot = ctx.createRadialGradient(hx, nameY, 0, hx, nameY, 180);
          hot.addColorStop(0,   'rgba(255,252,220,0.32)');
          hot.addColorStop(0.35,'rgba(255,248,205,0.12)');
          hot.addColorStop(1,   'rgba(255,243,185,0)');
          ctx.fillStyle = hot;
          ctx.beginPath(); ctx.arc(hx, nameY, 180, 0, Math.PI*2); ctx.fill();
        }
      }
    };

    drawBeam(beamL.ox, beamL.oy, angL);
    drawBeam(beamR.ox, beamR.oy, angR);
  }, [beamL.ox, beamL.oy, angL, beamR.ox, beamR.oy, angR, vw, vh]);

  return (
    <canvas ref={ref}
      style={{ position:'fixed', top:0, left:0, width:vw, height:vh,
        pointerEvents:'none', zIndex:3, mixBlendMode:'screen' }}
    />
  );
}

// Temple column wrapper — drag anywhere on column to repoint the spotlight
function TempleColumnWithSpot({ flip, margin, darkMode, beamOrigin, angle, onAngle }) {
  const side = flip ? 'right' : 'left';
  const dragging = React.useRef(false);
  const originRef = React.useRef(beamOrigin);
  const cbRef = React.useRef(onAngle);
  React.useEffect(() => { originRef.current = beamOrigin; }, [beamOrigin]);
  React.useEffect(() => { cbRef.current = onAngle; }, [onAngle]);

  React.useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      const { ox, oy } = originRef.current;
      const a = Math.atan2(e.clientX - ox, e.clientY - oy);
      cbRef.current(Math.max(-1.35, Math.min(1.35, a)));
    };
    const onUp = () => { dragging.current = false; };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);

  return (
    <div
      style={{ position:'fixed', [side]:margin, top:0, bottom:0, width:110, zIndex:1,
        overflow:'hidden', cursor: 'grab', userSelect:'none' }}
      onMouseDown={(e) => { dragging.current = true; e.preventDefault(); }}
    >
      <StageCurtain flip={flip} />
      <SpotlightHead oy={beamOrigin.oy} angle={angle} darkMode={darkMode} />
    </div>
  );
}

function placeBoxesSquare(vw, vh, nameAvoid) {
  const scale = Math.min(1, Math.max(0.75, Math.min(vw, vh) / 900));
  const bh = Math.round(110 * scale);
  const cols = 4, gap = 14, margin = 28;
  const bw = Math.round((Math.min(vw - 2 * margin, 1040) - (cols - 1) * gap) / cols);
  const cx = vw / 2, cy = vh / 2;
  const rowW = cols * bw + (cols - 1) * gap;
  const startX = cx - rowW / 2;
  // top row clears name above; bottom row clears name below
  const topY = cy - nameAvoid.h / 2 - bh - 32;
  const botY = cy + nameAvoid.h / 2 + 32;
  return Array.from({ length: 8 }, (_, i) => ({
    x: startX + (i % cols) * (bw + gap),
    y: i < cols ? topY : botY,
    w: bw, h: bh,
  }));
}

// Boxes orbit the name, spin up, then settle into a 3×3 grid around it.
function SpinningBoxes({ sections, nameAvoid, dims, boxRefs, shattered, onHover, onClick, darkMode }) {
  const [settled, setSettled] = React.useState(false);
  const [settledPos, setSettledPos] = React.useState(null);

  const scale = Math.min(1, Math.max(0.75, Math.min(dims.w, dims.h) / 900));
  const bh = Math.round(110 * scale);
  const bw = Math.round((Math.min(dims.w - 56, 1040) - 3 * 14) / 4);
  const cx = dims.w / 2, cy = dims.h / 2;
  const orbitRx = Math.min(nameAvoid.w / 2 + bw / 2 + 40, dims.w / 2 - bw / 2 - 20);
  const orbitRy = nameAvoid.h / 2 + bh / 2 + 32;

  React.useEffect(() => {
    // Bell-curve spin: slow → fast → slow, then RAF-driven settle to grid (no CSS snap)
    const SPIN_MS = 2500;
    const SETTLE_MS = 850;
    // Total angle = MAX_SPEED * SPIN_MS * integral(sin(π*t), 0..1) = MAX_SPEED * SPIN_MS * 2/π
    // Targeting 2 full turns → MAX_SPEED = 2*2π / (SPIN_MS * 2/π) = 2π² / SPIN_MS
    const MAX_SPEED = (2 * Math.PI * Math.PI) / SPIN_MS; // rad/ms

    const targetPos = placeBoxesSquare(dims.w, dims.h, nameAvoid);
    const startTime = performance.now();
    let angle = 0;
    let prevNow = startTime;
    let animPhase = 'spin';
    let settleStartPos = null;
    let settleStartTime = 0;
    let raf;

    const tick = (now) => {
      const dt = Math.min(now - prevNow, 50);
      prevNow = now;

      if (animPhase === 'spin') {
        const spinT = Math.min((now - startTime) / SPIN_MS, 1);
        // Bell-curve angular speed: zero at t=0 and t=1, peak at t=0.5
        angle += Math.sin(Math.PI * spinT) * MAX_SPEED * dt;

        sections.forEach((s, i) => {
          const el = boxRefs.current[s.key];
          if (!el) return;
          const a = (i / sections.length) * Math.PI * 2 - Math.PI / 2 + angle;
          el.style.transform = `translate(${cx + Math.cos(a)*orbitRx - bw/2}px,${cy + Math.sin(a)*orbitRy - bh/2}px)`;
        });

        if (spinT >= 1) {
          // Capture exact orbit positions for smooth settle interpolation
          settleStartPos = sections.map((s, i) => {
            const a = (i / sections.length) * Math.PI * 2 - Math.PI / 2 + angle;
            return { x: cx + Math.cos(a)*orbitRx - bw/2, y: cy + Math.sin(a)*orbitRy - bh/2 };
          });
          settleStartTime = now;
          animPhase = 'settle';
        }
      } else {
        const st = Math.min((now - settleStartTime) / SETTLE_MS, 1);
        // Ease-out cubic: fast start, glides to a smooth stop at target
        const ease = 1 - Math.pow(1 - st, 3);

        sections.forEach((s, i) => {
          const el = boxRefs.current[s.key];
          if (!el) return;
          const f = settleStartPos[i], to = targetPos[i];
          el.style.transform = `translate(${f.x + (to.x - f.x)*ease}px,${f.y + (to.y - f.y)*ease}px)`;
        });

        if (st >= 1) {
          setSettledPos(targetPos);
          setSettled(true);
          return; // stop loop
        }
      }

      raf = requestAnimationFrame(tick);
    };

    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  // Synchronously snap boxes to orbit before first paint — seamless hand-off from zoom placeholders
  React.useLayoutEffect(() => {
    sections.forEach((s, i) => {
      const el = boxRefs.current[s.key];
      if (!el) return;
      const a = (i / sections.length) * Math.PI * 2 - Math.PI / 2;
      el.style.transition = 'none';
      el.style.opacity = '1';
      el.style.transform = `translate(${cx + Math.cos(a)*orbitRx - bw/2}px,${cy + Math.sin(a)*orbitRy - bh/2}px)`;
    });
  }, []);

  // Re-place boxes whenever the viewport resizes (only after initial settle)
  React.useEffect(() => {
    if (!settled) return;
    setSettledPos(placeBoxesSquare(dims.w, dims.h, nameAvoid));
  }, [dims.w, dims.h]); // nameAvoid is derived from dims so always in sync

  const [hoveredKey, setHoveredKey] = React.useState(null);

  return sections.map((s, i) => {
    const broken = shattered[s.key];
    const sp = settledPos ? settledPos[i] : null;
    const isHovered = hoveredKey === s.key && !broken;
    const baseTransform = sp ? `translate(${sp.x}px,${sp.y}px)` : undefined;
    return (
      <button
        key={s.key}
        ref={el => boxRefs.current[s.key] = el}
        onMouseEnter={() => { setHoveredKey(s.key); onHover(s.key); }}
        onMouseLeave={() => setHoveredKey(null)}
        onFocus={() => setHoveredKey(s.key)}
        onBlur={() => setHoveredKey(null)}
        onClick={() => onClick(s.key)}
        style={{
          position: 'absolute', left: 0, top: 0,
          width: sp ? sp.w : bw, height: sp ? sp.h : bh,
          ...(settled ? {
            transform: baseTransform
              ? (isHovered ? `${baseTransform} scale(1.06)` : baseTransform)
              : undefined,
            opacity: broken ? 0 : 1,
            transition: broken ? 'opacity 0.05s' : 'opacity 0.5s 0.3s, transform 0.18s ease',
            pointerEvents: broken ? 'none' : 'auto',
          } : { pointerEvents: 'none' }),
          background: darkMode ? '#f2f2f2' : '#000', color: darkMode ? '#0a0a0a' : '#f0f0f0',
          border: 'none', outline: darkMode ? '1px solid rgba(255,255,255,0.08)' : 'none',
          cursor: 'pointer', padding: 12,
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between', alignItems: 'flex-start',
          fontFamily: "'JetBrains Mono',monospace", zIndex: isHovered ? 3 : 2, overflow: 'hidden',
        }}
      >
        <span style={{ fontSize:10, letterSpacing:'0.16em', opacity:0.6 }}>{s.index}</span>
        <span style={{ fontSize:10, letterSpacing:0, textTransform:'uppercase', alignSelf:'flex-end', whiteSpace:'nowrap', paddingRight:2 }}>{s.label}</span>
      </button>
    );
  });
}

function getTimeStr() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} LOCAL`;
}

function App() {
  const [tweaks, setTweaks] = React.useState({ hoverEffect:'dissolve', showGrid:false, nameFont:'Cormorant Garamond' });
  const [dims, setDims] = React.useState({ w:window.innerWidth, h:window.innerHeight });
  const [seed, setSeed] = React.useState(42);
  const [nameBroken, setNameBroken] = React.useState(false);
  const [shattered, setShattered] = React.useState({});
  const [shatterItems, setShatterItems] = React.useState([]);
  const [openSection, setOpenSection] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);
  const [timeStr, setTimeStr] = React.useState(getTimeStr());
  const [introPhase, setIntroPhase] = React.useState('zoomed-in');
  const [darkMode, setDarkMode] = React.useState(true);
  const [globeActive, setGlobeActive] = React.useState(false);
  const [resumeWriterActive, setResumeWriterActive] = React.useState(false);
  const calcSpotAngles = (w, h) => {
    const cols = 4, gap = 14, margin = 28, templeW = 110;
    const bw = Math.round((Math.min(w - 2*margin, 1040) - (cols-1)*gap) / cols);
    const rowW = cols*bw + (cols-1)*gap;
    const tMargin = Math.max(4, Math.round(((w - rowW) / 2 - templeW) / 2));
    const ox = tMargin + 55, oy = 80, nameY = h * 0.5;
    const ang = Math.atan2(w/2 - ox, nameY - oy);
    return { l: ang, r: -ang };
  };
  const [spotAngL, setSpotAngL] = React.useState(() => calcSpotAngles(window.innerWidth, window.innerHeight).l);
  const [spotAngR, setSpotAngR] = React.useState(() => calcSpotAngles(window.innerWidth, window.innerHeight).r);
  const boxRefs = React.useRef({});
  const resetTimers = React.useRef({});

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      else if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  React.useEffect(() => {
    const onResize = () => {
      const w = window.innerWidth, h = window.innerHeight;
      setDims({ w, h });
      const a = calcSpotAngles(w, h);
      setSpotAngL(a.l);
      setSpotAngR(a.r);
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  React.useEffect(() => {
    const t = setInterval(() => setTimeStr(getTimeStr()), 30000);
    return () => clearInterval(t);
  }, []);


  React.useEffect(() => {
    const t1 = setTimeout(() => setIntroPhase('zooming-out'), 550);
    const t2 = setTimeout(() => setIntroPhase('done'), 1850);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const introScale = introPhase === 'zoomed-in' ? 8 : 1;
  const introTransition = introPhase === 'zoomed-in' ? 'none' : 'transform 1.2s cubic-bezier(.7,0,.2,1)';

  const nameAvoid = React.useMemo(() => {
    const w = Math.min(dims.w*0.7, 900), h = dims.h * 0.44;
    return { x:(dims.w-w)/2, y:(dims.h-h)/2, w, h };
  }, [dims]);

  const boxes = React.useMemo(() => placeBoxes(SECTIONS.length, dims.w, dims.h, nameAvoid, seed), [dims, nameAvoid, seed]);

  const triggerShatter = (key, rect) => {
    if (shattered[key]) return;
    const label = SECTIONS.find(s => s.key===key)?.label || '';
    setShattered(s => ({ ...s, [key]:true }));
    setShatterItems(items => [...items, { id:key+'-'+Date.now(), rect, effect:tweaks.hoverEffect, bg:'#000', color:'#fff', label }]);
    clearTimeout(resetTimers.current[key]);
    resetTimers.current[key] = setTimeout(() => setShattered(s => { const n={...s}; delete n[key]; return n; }), 2500);
  };

  const onBoxHover = (key) => { /* hover is now visual-only — scale handled inside BoxGrid */ };

  const onBoxClick = (key) => {
    if (shattered[key]) return;
    const el = boxRefs.current[key];
    if (!el) return;
    const r = el.getBoundingClientRect();
    if (key === 'about')  { setGlobeActive(true); }
    else if (key === 'resume') { setResumeWriterActive(true); }
    else { setOpenSection(key); }
    triggerShatter(key, { left:r.left, top:r.top, width:r.width, height:r.height });
  };
  const shatterDone = (id) => setShatterItems(items => items.filter(it => it.id!==id));

  const fg  = darkMode ? '#f0f0f0' : '#000';
  const bg  = darkMode ? '#111' : '#fafafa';
  const fgD = darkMode ? 'rgba(240,240,240,0.5)' : 'rgba(0,0,0,0.5)';
  const dot = darkMode
    ? 'radial-gradient(circle,rgba(255,255,255,0.06) 1px,transparent 1px)'
    : 'radial-gradient(circle,rgba(0,0,0,0.07) 1px,transparent 1px)';
  const colorTransition = 'color 0.35s, background 0.35s, border-color 0.35s, opacity 0.35s';
  const chromeStyle = { fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color: fg, transition: colorTransition };

  return (
    <div style={{ position:'relative', zIndex:0, width:'100vw', height:'100vh', background: bg, overflow:'hidden', backgroundImage: dot, backgroundSize:'28px 28px', transition:'background 0.4s, background-image 0.4s' }}>

      {/* Stage scene — floor, teaser, proscenium frame */}
      {dims.w > 900 && <StageDecor dims={dims} />}

      {/* Stage curtains with studio spotlights */}
      {dims.w > 900 && (() => {
        const cols = 4, gap = 14, margin = 28, templeW = 110;
        const bw = Math.round((Math.min(dims.w - 2*margin, 1040) - (cols-1)*gap) / cols);
        const rowW = cols*bw + (cols-1)*gap;
        const boxLeft = (dims.w - rowW) / 2;
        const tMargin = Math.max(4, Math.round((boxLeft - templeW) / 2));
        const spotY = 68;
        const beamL = { ox: tMargin + 55, oy: spotY };
        const beamR = { ox: dims.w - tMargin - 55, oy: spotY };
        return (<>
          <SpotlightBeams beamL={beamL} beamR={beamR} angL={spotAngL} angR={spotAngR} vw={dims.w} vh={dims.h} />
          <TempleColumnWithSpot flip={false} margin={tMargin} darkMode={darkMode}
            beamOrigin={beamL} angle={spotAngL} onAngle={setSpotAngL} />
          <TempleColumnWithSpot flip={true}  margin={tMargin} darkMode={darkMode}
            beamOrigin={beamR} angle={spotAngR} onAngle={setSpotAngR} />
        </>);
      })()}

      {/* Corner chrome */}
      <div style={{ position:'fixed', top:28, left:32, zIndex:5 }}>
        <div style={chromeStyle}>AKSHAY TALLIKAR</div>
        <div style={{...chromeStyle,opacity:0.5}}>PORTFOLIO · MMXXVI</div>
      </div>
      <div style={{ position:'fixed', top:28, right:32, zIndex:5, textAlign:'right' }}>
        <div style={chromeStyle}>{timeStr}</div>
        <button
          onClick={() => setDarkMode(d => !d)}
          style={{
            marginTop:6, display:'block', marginLeft:'auto',
            fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.18em',
            textTransform:'uppercase', background:'transparent',
            border:`1px solid ${darkMode ? 'rgba(255,255,255,0.28)' : 'rgba(0,0,0,0.22)'}`, color: fg,
            cursor:'pointer', padding:'4px 10px', transition:'color 0.3s,border-color 0.3s',
          }}
        >
          {darkMode ? '◑ LIGHT' : '◐ DARK'}
        </button>
      </div>
      <div style={{ position:'fixed', bottom:28, left:32, zIndex:5 }}>
        <div style={{...chromeStyle,opacity:0.5}}>[ click a box to open ]</div>
      </div>
      <div style={{ position:'fixed', bottom:28, right:32, zIndex:5 }}>
        <div style={chromeStyle}>08 SECTIONS</div>
      </div>

      {/* Zoom intro wrapper — name only */}
      <div style={{ position:'absolute', inset:0, transform:`scale(${introScale})`, transformOrigin:'50% 50%', transition:introTransition, willChange:'transform' }}>

        {/* Name */}
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', textAlign:'center', zIndex:3, width:'min(900px,90vw)', pointerEvents:'none' }}>
          <h1
            onMouseEnter={() => setNameBroken(true)}
            onMouseLeave={() => setNameBroken(false)}
            tabIndex={0}
            style={{ fontWeight:500, fontStyle:'italic', lineHeight:0.95, letterSpacing: nameBroken ? '-0.01em' : '-0.02em', color: fg, transition: colorTransition, cursor:'default', pointerEvents:'auto', display:'inline-block', padding:'0 8px', userSelect:'none', fontFamily:`'${tweaks.nameFont}','Cormorant Garamond',serif`, transform: nameBroken ? 'scale(1.25)' : 'scale(1)', transition:'transform 0.9s cubic-bezier(.22,.61,.36,1),letter-spacing 0.9s cubic-bezier(.22,.61,.36,1)', fontSize:`clamp(64px,${Math.min(dims.w/11,180)}px,200px)` }}>
            Akshay Tallikar
          </h1>
          <div style={{ marginTop:18, display:'flex', alignItems:'center', justifyContent:'center', gap:14, fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.28em', textTransform:'uppercase', color: fg, transition: colorTransition, opacity: nameBroken ? 0 : 0.6, transform: nameBroken ? 'translateY(-4px)' : 'translateY(0)', transition:'opacity 0.5s,transform 0.6s cubic-bezier(.22,.61,.36,1)' }}>
            <span style={{ display:'inline-block', width:40, height:1, background: fg, opacity:0.3 }} />
            DATA · SOFTWARE ENGINEER
            <span style={{ display:'inline-block', width:40, height:1, background: fg, opacity:0.3 }} />
          </div>

          {/* Status badge */}
          <div style={{ marginTop:16, display:'flex', alignItems:'center', justifyContent:'center', gap:8, opacity: nameBroken ? 0 : 1, transition:'opacity 0.5s 0.1s' }}>
            <span style={{ width:7, height:7, borderRadius:'50%', background:'#16a34a', flexShrink:0, animation:'badge-pulse 2.2s ease-out infinite' }} />
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.22em', textTransform:'uppercase', color:'#16a34a' }}>Open to Opportunities</span>
          </div>

          {/* Stat strip */}
          <div style={{ marginTop:18, display:'flex', flexWrap:'wrap', alignItems:'center', justifyContent:'center', gap:7, opacity: nameBroken ? 0 : 1, transition:'opacity 0.5s 0.15s' }}>
            {["Ohio State '25","B.S. Mathematics","John Deere","Qualcomm","Johnson & Johnson","Chicago, IL"].map((chip,i) => (
              <span key={i} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.1em', padding:'4px 10px', border:`1px solid ${darkMode ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.16)'}`, color: fgD, background: darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.85)', transition:'color 0.3s,border-color 0.3s,background 0.3s' }}>{chip}</span>
            ))}
          </div>
        </div>

        {/* Box placeholders — live inside zoom div so they scale out with the name */}
        {introPhase !== 'done' && (() => {
          const sc2 = Math.min(1, Math.max(0.75, Math.min(dims.w, dims.h) / 900));
          const pbh = Math.round(110 * sc2);
          const pbw = Math.round((Math.min(dims.w - 56, 1040) - 3 * 14) / 4);
          const pcx = dims.w / 2, pcy = dims.h / 2;
          const pRx = Math.min(nameAvoid.w / 2 + pbw / 2 + 40, dims.w / 2 - pbw / 2 - 20);
          const pRy = nameAvoid.h / 2 + pbh / 2 + 32;
          return SECTIONS.map((s, i) => {
            const a = (i / SECTIONS.length) * Math.PI * 2 - Math.PI / 2;
            return (
              <div key={s.key} style={{
                position: 'absolute', left: 0, top: 0, zIndex: 2, pointerEvents: 'none',
                width: pbw, height: pbh, background: darkMode ? '#f2f2f2' : '#000',
                transform: `translate(${pcx + Math.cos(a)*pRx - pbw/2}px,${pcy + Math.sin(a)*pRy - pbh/2}px)`,
              }} />
            );
          });
        })()}

      </div>

      {/* Spinning boxes — mount after zoom-out, useLayoutEffect snaps to orbit (no flash), then spin */}
      {introPhase === 'done' && (
        <SpinningBoxes
          sections={SECTIONS}
          nameAvoid={nameAvoid}
          dims={dims}
          boxRefs={boxRefs}
          shattered={shattered}
          darkMode={darkMode}
          onHover={onBoxHover}
          onClick={onBoxClick}
        />
      )}

      {/* Shatter particles */}
      {shatterItems.map(it => <ShatterLayer key={it.id} items={[it]} onDone={() => shatterDone(it.id)} />)}

      {/* Modal */}
      {openSection && <Modal sectionKey={openSection} variant="center" darkMode={openSection === 'resume' ? false : darkMode} onClose={() => { setOpenSection(null); setShattered({}); }} />}

      {/* Globe */}
      {globeActive && <GlobeZoom onComplete={() => { setGlobeActive(false); setOpenSection('about'); }} onCancel={() => { setGlobeActive(false); setOpenSection('about'); }} />}

      {/* Resume Writer */}
      {resumeWriterActive && <ResumeWriter onComplete={() => { setResumeWriterActive(false); setOpenSection('resume'); }} onCancel={() => { setResumeWriterActive(false); setOpenSection('resume'); }} />}

      {/* Tweaks (edit mode) */}
      {editMode && <TweaksPanel values={tweaks} onChange={setTweaks} />}

      <style>{`
        button:focus{outline:none;}
        button:focus-visible{outline:1px solid rgba(0,0,0,0.4);outline-offset:2px;}
        @keyframes badge-pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,0.55)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
        @keyframes achievement-pop{0%{opacity:0;transform:translateY(20px) scale(0.68);filter:blur(4px)}58%{opacity:1;transform:translateY(-6px) scale(1.06);filter:blur(0)}78%{transform:translateY(2px) scale(0.98)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
        @keyframes achievement-shine{0%{left:-36%;opacity:0}18%{opacity:1}100%{left:115%;opacity:0}}
        @keyframes social-card-in{0%{opacity:0;transform:translateY(26px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes social-photo-settle{0%{transform:scale(1.08);filter:saturate(0.8)}100%{transform:scale(1);filter:saturate(1)}}
        @keyframes social-like-pulse{0%{opacity:0;transform:translate(-50%,-50%) scale(0.72)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0.78;transform:translate(-50%,-54%) scale(0.94)}}
        @keyframes social-likes-pop{from{transform:scale(1)}to{transform:scale(1.018)}}
        @keyframes code-terminal-in{0%{opacity:0;transform:translateY(20px) scale(0.97);filter:blur(3px)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
        @keyframes code-cursor-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
        @keyframes project-pop{0%{opacity:0;transform:translateY(18px) scale(0.86)}60%{opacity:1;transform:translateY(-4px) scale(1.03)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes contact-stage-in{0%{opacity:0;transform:translateY(24px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes phone-ring{0%,100%{transform:rotate(0) translateX(0)}20%{transform:rotate(-2.5deg) translateX(-2px)}40%{transform:rotate(2.5deg) translateX(2px)}60%{transform:rotate(-1.5deg) translateX(-1px)}80%{transform:rotate(1.5deg) translateX(1px)}}
        @keyframes contact-pulse{0%{box-shadow:0 0 0 0 rgba(103,224,141,0.38)}70%{box-shadow:0 0 0 24px rgba(103,224,141,0)}100%{box-shadow:0 0 0 0 rgba(103,224,141,0)}}
        @keyframes email-panel-in{0%{opacity:0;transform:translateY(22px) scale(0.94);filter:blur(4px)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
        @keyframes bts-flip{0%{transform:translate(calc(-50% + 180px),calc(-50% - 12px)) rotateY(-42deg) rotate(9deg) scale(0.88);opacity:0}65%{transform:translate(-50%,-53%) rotateY(8deg) rotate(-1deg) scale(1.03);opacity:1}100%{transform:translate(-50%,-50%) rotateY(0) rotate(0) scale(1);opacity:1}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
